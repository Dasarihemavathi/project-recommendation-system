<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Recommendation System</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="layout">
    <section class="intro">
      <p class="eyebrow">Personalized builder</p>
      <h1>Project Recommendation System</h1>
      <p>Find project ideas that match your skills, interests, preferred domain, and difficulty level.</p>
    </section>

    <section class="workspace">
      <form id="recommendForm" class="panel">
        <label>
          Skills
          <input name="skills" placeholder="Python, HTML, SQL, machine learning" required>
        </label>
        <label>
          Interests
          <input name="interests" placeholder="finance, education, automation">
        </label>
        <label>
          Preferred Domain
          <select name="domain">
            <option>Web Development</option>
            <option>Data Science</option>
            <option>AI</option>
            <option>Database</option>
          </select>
        </label>
        <label>
          Difficulty
          <select name="difficulty">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
          </select>
        </label>
        <button type="submit">Recommend Projects</button>
      </form>

      <section id="results" class="results"></section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
